<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>イベント分析（公開閲覧）</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.5.0/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>

  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; max-width: 1100px; margin: 0 auto; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin: 8px 0; }
    input { padding: 8px; min-width: 260px; }
    button { padding: 8px 12px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin: 12px 0; }
    pre { background:#f6f6f6; padding:12px; overflow:auto; border-radius: 10px; }
    .small { color:#666; font-size: 13px; margin: 6px 0; }

    /* ローディング */
    #loadingMsg {
      display: none;
      align-items: center;
      gap: 8px;
      color: #555;
      font-size: 14px;
      margin: 6px 0;
    }
    #loadingMsg.visible { display: flex; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #ccc;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .chartWrap {
      position: relative;
      height: 360px;
      border: 1px solid #eee;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      margin: 10px 0;
    }
    .chartWrap canvas {
      position: relative;
      z-index: 1;
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>

<body>
  <h1>イベント分析（公開閲覧）</h1>
  <p class="small">
    このページは <b>閲覧専用</b>。ログイン欄・保存機能は排除。<br>
    横軸は captured_at をUTCとして解釈し、表示は Asia/Tokyo 固定。
  </p>

  <div class="card">
    <h2>公開データ読み込み</h2>
    <div class="row">
      <label>event_id：</label>
      <input id="eventId" value="BA-2026-02" />
      <button id="loadBtn">読み込む</button>
    </div>

    <div id="loadingMsg">
      <div class="spinner"></div>
      <span id="loadingText">読み込み中…</span>
    </div>

    <div class="small">
      Chart.js: <span id="chartVer"></span> / Luxon: <span id="luxonVer"></span>
    </div>

    <div class="chartWrap"><canvas id="participantsChart"></canvas></div>
    <div class="chartWrap"><canvas id="difficultyChart"></canvas></div>

    <h3>取得ログ</h3>
    <pre id="readLog"></pre>

    <h3>描画ログ</h3>
    <pre id="drawLog"></pre>
  </div>

  <script>
    const PROJECT_URL = "https://lfvxfvcijdtnpuhrlnqj.supabase.co";
    const PUBLISHABLE_KEY = "sb_publishable_3oNlDsSU06CHAJkhrJ9Tvg_4WmLAZ6o";
    const PAGE_SIZE = 1000; // Supabaseの1回あたりの上限

    const readLogEl  = document.getElementById("readLog");
    const drawLogEl  = document.getElementById("drawLog");
    const loadingMsg = document.getElementById("loadingMsg");
    const loadingTxt = document.getElementById("loadingText");
    const loadBtn    = document.getElementById("loadBtn");

    const logRead = (s) => readLogEl.textContent += s + "\n";
    const logDraw = (s) => drawLogEl.textContent += s + "\n";

    document.getElementById("chartVer").textContent =
      (window.Chart && Chart.version) ? Chart.version : "NOT LOADED";
    document.getElementById("luxonVer").textContent =
      (window.luxon && luxon.VERSION) ? luxon.VERSION : "NOT LOADED";

    // ------------------------------------------------
    // ローディング制御
    // ------------------------------------------------
    function setLoading(on, text = "読み込み中…") {
      loadBtn.disabled = on;
      loadingMsg.classList.toggle("visible", on);
      loadingTxt.textContent = text;
    }

    // ------------------------------------------------
    // 件数上限対策：ページネーションで全件取得
    // ------------------------------------------------
    function makeLoadUrl(eventId, offset = 0) {
      return `${PROJECT_URL}/rest/v1/snapshots_public` +
        `?select=captured_at,participants,lunatic,torment,insane,extreme,hardcore,veryhard,hard,normal` +
        `&event_id=eq.${encodeURIComponent(eventId)}` +
        `&order=captured_at.asc` +
        `&limit=${PAGE_SIZE}&offset=${offset}`;
    }

    async function fetchPage(url) {
      const res = await fetch(url, {
        headers: {
          apikey: PUBLISHABLE_KEY,
          Authorization: `Bearer ${PUBLISHABLE_KEY}`,
          Accept: "application/json"
        }
      });
      const text = await res.text();
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${text}`);
      return text ? JSON.parse(text) : [];
    }

    async function fetchAllRows(eventId) {
      readLogEl.textContent = "";
      let allRows = [];
      let offset = 0;
      let page = 1;

      while (true) {
        const url = makeLoadUrl(eventId, offset);
        logRead(`--- PAGE ${page} (offset=${offset}) ---`);
        logRead(url);

        setLoading(true, `読み込み中… (${page}ページ目)`);
        const rows = await fetchPage(url);

        logRead(`取得件数: ${rows.length}`);
        allRows = allRows.concat(rows);

        if (rows.length < PAGE_SIZE) break; // 最終ページ
        offset += PAGE_SIZE;
        page++;
      }

      logRead(`\n合計取得件数: ${allRows.length}`);
      return allRows;
    }

    // ------------------------------------------------
    // 時刻・数値変換
    // ------------------------------------------------
    function toMsUTC(x) {
      const s = String(x).trim();
      let dt = luxon.DateTime.fromISO(s, { zone: "utc" });
      if (!dt.isValid) dt = luxon.DateTime.fromISO(s + "Z");
      return dt.isValid ? dt.toMillis() : null;
    }
    function toNum(y) {
      const n = Number(y);
      return Number.isFinite(n) ? n : null;
    }

    // ------------------------------------------------
    // 難易度グラフの色定義（強→弱 で赤→青）
    // ------------------------------------------------
    const DIFFICULTY_COLORS = {
      lunatic:  "#c0392b", // 深赤
      torment:  "#e67e22", // オレンジ
      insane:   "#f1c40f", // 黄
      extreme:  "#27ae60", // 緑
      hardcore: "#16a085", // ティール
      veryhard: "#2980b9", // 青
      hard:     "#8e44ad", // 紫
      normal:   "#95a5a6", // グレー
    };

    let chart1 = null, chart2 = null;

    function renderCharts(rows) {
      drawLogEl.textContent = "";
      logDraw(`rows: ${rows.length}`);
      if (!rows.length) { logDraw("データ0件"); return; }

      const seriesXY = (key) => {
        const pts = rows
          .map(r => ({ x: toMsUTC(r.captured_at), y: toNum(r[key]) }))
          .filter(p => p.x !== null && p.y !== null);
        logDraw(`series "${key}" validPoints: ${pts.length}/${rows.length}`);
        return pts;
      };

      const commonOptions = {
        responsive: true,
        maintainAspectRatio: false,
        normalized: true,
        adapters: { date: { zone: "Asia/Tokyo" } },
        scales: {
          x: {
            type: "time",
            time: {
              tooltipFormat: "yyyy-LL-dd HH:mm:ss",
              displayFormats: { minute:"LL-dd HH:mm", hour:"LL-dd HH:mm", day:"LL-dd" }
            }
          }
        }
      };

      const ctx1 = document.getElementById("participantsChart");
      if (chart1) chart1.destroy();
      chart1 = new Chart(ctx1, {
        type: "line",
        data: { datasets: [{
          label: "参加人数",
          data: seriesXY("participants"),
          borderColor: "#2c3e50",
          backgroundColor: "rgba(44,62,80,0.08)",
          borderWidth: 3,
          pointRadius: 2,
          pointHitRadius: 10,
          fill: true,
        }]},
        options: commonOptions
      });

      const ctx2 = document.getElementById("difficultyChart");
      if (chart2) chart2.destroy();
      chart2 = new Chart(ctx2, {
        type: "line",
        data: { datasets: Object.entries(DIFFICULTY_COLORS).map(([key, color]) => ({
          label: key.charAt(0).toUpperCase() + key.slice(1),
          data: seriesXY(key),
          borderColor: color,
          backgroundColor: color,
          borderWidth: 2,
          pointRadius: 0,
          pointHitRadius: 8,
        }))},
        options: commonOptions
      });

      logDraw("draw: OK");
    }

    // ------------------------------------------------
    // メイン
    // ------------------------------------------------
    async function loadPublic() {
      const eventId = document.getElementById("eventId").value.trim();
      if (!eventId) return alert("event_id が空");

      setLoading(true);
      try {
        const rows = await fetchAllRows(eventId);
        renderCharts(rows);
      } catch (e) {
        logDraw("loadPublic ERROR: " + e.message);
      } finally {
        setLoading(false);
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadPublic);
    loadPublic();
  </script>
</body>
</html>

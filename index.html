<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>イベント分析</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- Luxon + Adapter -->
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.5.0/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>

  <!-- ★Touch pinch/panのためにHammer.js（重要） -->
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

  <!-- Zoom plugin -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --shadow: 0 6px 18px rgba(0,0,0,.06);
      --r:14px;
      --btn:#111827;
      --btnText:#fff;
    }
    *{ box-sizing:border-box; }
    html, body { margin:0; padding:0; overflow-x: hidden; } /* ★右余白（横スクロール）根絶 */
    body{ font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }

    /* ===== Top Bar ===== */
    .topbar{
      position: sticky; top:0; z-index:50;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .topbar .inner{
      max-width: 1240px;
      margin: 0 auto;
      padding: 10px 12px;
      display:flex; align-items:center; gap:10px;
      min-width: 0;
    }
    .title{
      font-weight: 900;
      letter-spacing: .2px;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .grow{ flex: 1 1 auto; min-width: 0; }
    .field{
      display:flex; align-items:center; gap:8px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .field input{
      width:100%;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background:#fff;
      outline:none;
      font-size: 14px;
      min-width: 0;
    }
    .btn{
      border: 1px solid var(--line);
      background:#fff;
      border-radius: 12px;
      padding: 9px 10px;
      cursor:pointer;
      font-size: 14px;
      white-space: nowrap;
    }
    .btn.primary{
      background: var(--btn);
      color: var(--btnText);
      border-color: transparent;
    }
    .btn:disabled{ opacity:.55; cursor:not-allowed; }
    .pill{
      font-size:12px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background:#fff;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    /* menu */
    .menuWrap{ position: relative; flex: 0 0 auto; }
    .menu{
      position:absolute; right:0; top: 44px;
      background:#fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      min-width: 220px;
      padding: 8px;
      display:none;
    }
    .menu.open{ display:block; }
    .menu .row{
      display:flex; gap:8px; align-items:center; justify-content:space-between;
      padding: 6px;
      border-radius: 10px;
    }
    .menu .row:hover{ background:#f3f4f6; }
    .menu label{ font-size: 12px; color: var(--muted); }
    .menu select{
      width: 120px;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background:#fff;
      outline:none;
    }

    /* ===== Tabs ===== */
    .tabs{
      max-width: 1240px;
      margin: 8px auto 0;
      padding: 0 12px 10px;
      display:flex; gap:8px; flex-wrap: wrap;
    }
    .tab{
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background:#fff;
      color: var(--muted);
      cursor:pointer;
      user-select:none;
      font-size: 13px;
    }
    .tab.active{
      background:#111827;
      color:#fff;
      border-color: transparent;
    }

    /* ===== Content ===== */
    .container{ max-width:1240px; margin: 10px auto 30px; padding: 0 12px; min-width: 0; }
    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    @media (max-width: 980px){ .grid{ grid-template-columns: 1fr; } }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding: 12px;
      min-width: 0;
    }

    .kpis{ display:flex; gap:10px; flex-wrap: wrap; }
    .kpi{
      border:1px solid var(--line);
      border-radius: 12px;
      background:#fff;
      padding: 8px 10px;
      min-width: 160px;
      flex: 1 1 160px;
    }
    .kpi .t{ font-size: 12px; color: var(--muted); }
    .kpi .v{ font-size: 16px; font-weight: 900; margin-top:2px; }

    /* ===== Charts ===== */
    .chartBlock{
      border:1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      background:#fff;
      padding: 12px;
      margin: 12px 0;
      min-width: 0;
      max-width: 100%;
    }
    .chartTop{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; flex-wrap: wrap;
      margin-bottom: 8px;
      min-width: 0;
    }
    .chartTop .t{ font-weight: 900; }
    .chartTop .right{
      display:flex; gap:8px; align-items:center; flex-wrap: wrap;
      min-width: 0;
    }
    .chartWrap{
      position:relative;
      height: 340px;
      border: 1px solid #f0f0f0;
      border-radius: 12px;
      overflow:hidden;
      background:#fff;
      max-width: 100%;
    }
    .chartWrap.tall{ height: 380px; }

    canvas{
      width:100% !important;
      height:100% !important;
      display:block;
      /* 既定は「縦スクロール優先＋ピンチ許可」 */
      touch-action: pan-y pinch-zoom;
    }
    /* ★タッチ端末ではページズームを抑えてチャート優先にしたいので、canvasはnoneに */
    @media (pointer: coarse){
      canvas{ touch-action: none; }
    }

    .bottomCtl{
      display:flex; align-items:center; gap:10px; flex-wrap: wrap;
      margin-top: 10px;
      min-width: 0;
    }
    .mini{ font-size: 12px; color: var(--muted); min-width: 0; }

    /* ===== One slider (two thumbs) ===== */
    .rangeOne{
      position: relative;
      height: 34px;
      flex: 1 1 420px;
      min-width: 260px;
      max-width: 100%;
    }
    .rangeOne input[type="range"]{
      position:absolute;
      left:0; right:0; top: 8px;
      width:100%;
      margin:0;
      pointer-events:none;
      -webkit-appearance: none;
      background: transparent;
    }
    .rangeOne input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance: none;
      pointer-events:auto;
      height: 18px; width: 18px;
      border-radius: 999px;
      border: 2px solid #111827;
      background:#fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.12);
    }
    .rangeOne input[type="range"]::-moz-range-thumb{
      pointer-events:auto;
      height: 18px; width: 18px;
      border-radius: 999px;
      border: 2px solid #111827;
      background:#fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.12);
    }
    .rangeTrack{
      position:absolute;
      left:0; right:0; top: 16px;
      height: 6px;
      border-radius: 999px;
      background: #e5e7eb;
    }
    .rangeFill{
      position:absolute;
      top:0; height: 6px;
      border-radius: 999px;
      background: #111827;
      left:0; width:100%;
    }

    /* ===== Loading ===== */
    #loadingMsg{
      display:none;
      align-items:center;
      gap:8px;
      margin-left: 10px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    #loadingMsg.visible{ display:flex; }
    .spinner{
      width: 14px; height: 14px;
      border:2px solid #d1d5db;
      border-top-color:#374151;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    pre{
      background:#f6f6f6;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px;
      overflow:auto;
      font-size: 12px;
      line-height: 1.5;
      max-width: 100%;
    }

    /* ===== Mobile header compact ===== */
    @media (max-width: 700px){
      .topbar .inner{ gap:8px; }
      .title{ font-size: 14px; }
      .pill{ display:none; }
      #loadingMsg{ display:none !important; }
      .chartWrap{ height: 420px; }
      .chartWrap.tall{ height: 460px; }
      .rangeOne{ min-width: 0; flex: 1 1 100%; }
      .mini{ width: 100%; }
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="inner">
    <div class="title">イベント分析</div>

    <div class="field grow">
      <input id="eventId" type="text" value="BA-2026-02" aria-label="event_id">
    </div>

    <button class="btn primary" id="loadBtn">読み込む</button>

    <div class="menuWrap">
      <button class="btn" id="menuBtn" aria-label="メニュー">⋯</button>
      <div class="menu" id="menu">
        <div class="row">
          <label>期間</label>
          <select id="presetSelect">
            <option value="all">全期間</option>
            <option value="24h">24h</option>
            <option value="12h">12h</option>
            <option value="6h">6h</option>
            <option value="1h">1h</option>
          </select>
        </div>
        <div class="row">
          <button class="btn" id="jumpLatestBtn" style="width:100%;">最新へ</button>
        </div>
        <div class="row">
          <button class="btn" id="resetAllBtn" style="width:100%;">全リセット</button>
        </div>
        <div class="row">
          <button class="btn" id="closeMenuBtn" style="width:100%;">閉じる</button>
        </div>
      </div>
    </div>

    <div class="pill" id="statusPill">待機</div>
    <div class="pill">件数 <span id="rowCount">0</span></div>

    <div id="loadingMsg">
      <div class="spinner"></div><span id="loadingText">読み込み中…</span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="numbers">人数</div>
    <div class="tab" data-tab="share">シェア（%）</div>
    <div class="tab" data-tab="delta">Δ・速度</div>
    <div class="tab" data-tab="rank">順位</div>
    <div class="tab" data-tab="logs">ログ</div>
  </div>
</div>

<div class="container">

  <div class="grid">
    <div class="card">
      <div class="kpis">
        <div class="kpi"><div class="t">最新時刻（JST）</div><div class="v" id="kpiTime">-</div></div>
        <div class="kpi"><div class="t">participants</div><div class="v" id="kpiP">-</div></div>
        <div class="kpi"><div class="t">Hardcore</div><div class="v" id="kpiHC">-</div></div>
        <div class="kpi"><div class="t">Extreme</div><div class="v" id="kpiEX">-</div></div>
      </div>
    </div>

    <div class="card">
      <pre id="checkBox">未読み込み</pre>
    </div>
  </div>

  <!-- ===== Tab: numbers ===== -->
  <div id="tab_numbers">

    <div class="chartBlock">
      <div class="chartTop">
        <div class="t">① 参加人数（participants）</div>
        <div class="right">
          <button class="btn" id="resetZoom_participants">ズーム解除</button>
        </div>
      </div>
      <div class="chartWrap"><canvas id="chParticipants"></canvas></div>

      <div class="bottomCtl">
        <div class="rangeOne" data-key="participants">
          <div class="rangeTrack"><div class="rangeFill" id="fill_participants"></div></div>
          <input id="rngA_participants" type="range" min="0" max="100" value="0" />
          <input id="rngB_participants" type="range" min="0" max="100" value="100" />
        </div>
        <div class="mini" id="label_participants"></div>
      </div>
    </div>

    <div class="chartBlock">
      <div class="chartTop">
        <div class="t">② 主戦場：Hardcore vs Extreme</div>
        <div class="right">
          <button class="btn" id="resetZoom_main">ズーム解除</button>
        </div>
      </div>
      <div class="chartWrap"><canvas id="chMain"></canvas></div>

      <div class="bottomCtl">
        <div class="rangeOne" data-key="main">
          <div class="rangeTrack"><div class="rangeFill" id="fill_main"></div></div>
          <input id="rngA_main" type="range" min="0" max="100" value="0" />
          <input id="rngB_main" type="range" min="0" max="100" value="100" />
        </div>
        <div class="mini" id="label_main"></div>
      </div>
    </div>

    <div class="chartBlock">
      <div class="chartTop">
        <div class="t">③ 上位帯：Lunatic / Torment / Insane</div>
        <div class="right">
          <button class="btn" id="resetZoom_top">ズーム解除</button>
        </div>
      </div>
      <div class="chartWrap"><canvas id="chTop"></canvas></div>

      <div class="bottomCtl">
        <div class="rangeOne" data-key="top">
          <div class="rangeTrack"><div class="rangeFill" id="fill_top"></div></div>
          <input id="rngA_top" type="range" min="0" max="100" value="0" />
          <input id="rngB_top" type="range" min="0" max="100" value="100" />
        </div>
        <div class="mini" id="label_top"></div>
      </div>
    </div>

    <div class="chartBlock">
      <div class="chartTop">
        <div class="t">④ 下位帯：VeryHard / Hard / Normal（積み上げ面）</div>
        <div class="right">
          <button class="btn" id="resetZoom_low">ズーム解除</button>
        </div>
      </div>
      <div class="chartWrap"><canvas id="chLow"></canvas></div>

      <div class="bottomCtl">
        <div class="rangeOne" data-key="low">
          <div class="rangeTrack"><div class="rangeFill" id="fill_low"></div></div>
          <input id="rngA_low" type="range" min="0" max="100" value="0" />
          <input id="rngB_low" type="range" min="0" max="100" value="100" />
        </div>
        <div class="mini" id="label_low"></div>
      </div>
    </div>

  </div>

  <!-- ===== Tab: share ===== -->
  <div id="tab_share" style="display:none;">
    <div class="chartBlock">
      <div class="chartTop">
        <div class="t">⑤ シェア（%）</div>
        <div class="right">
          <button class="btn" id="resetZoom_share">ズーム解除</button>
        </div>
      </div>
      <div class="chartWrap tall"><canvas id="chShare"></canvas></div>

      <div class="bottomCtl">
        <div class="rangeOne" data-key="share">
          <div class="rangeTrack"><div class="rangeFill" id="fill_share"></div></div>
          <input id="rngA_share" type="range" min="0" max="100" value="0" />
          <input id="rngB_share" type="range" min="0" max="100" value="100" />
        </div>
        <div class="mini" id="label_share"></div>
      </div>
    </div>
  </div>

  <!-- ===== Tab: delta ===== -->
  <div id="tab_delta" style="display:none;">
    <div class="chartBlock">
      <div class="chartTop">
        <div class="t">⑥ 速度（/h）：participants / Hardcore / Extreme</div>
        <div class="right">
          <button class="btn" id="resetZoom_rate">ズーム解除</button>
        </div>
      </div>
      <div class="chartWrap"><canvas id="chRate"></canvas></div>

      <div class="bottomCtl">
        <div class="rangeOne" data-key="rate">
          <div class="rangeTrack"><div class="rangeFill" id="fill_rate"></div></div>
          <input id="rngA_rate" type="range" min="0" max="100" value="0" />
          <input id="rngB_rate" type="range" min="0" max="100" value="100" />
        </div>
        <div class="mini" id="label_rate"></div>
      </div>
    </div>
  </div>

  <!-- ===== Tab: rank ===== -->
  <div id="tab_rank" style="display:none;">
    <div class="chartBlock">
      <div class="chartTop">
        <div class="t">⑦ 順位ポジション（境界＋入力順位）</div>
        <div class="right">
          <input id="rankInput" type="number" placeholder="順位（例: 73059）"
                 style="padding:9px 10px;border:1px solid var(--line);border-radius:12px;min-width:180px;max-width:220px;">
          <button class="btn primary" id="rankApplyBtn">反映</button>
          <button class="btn" id="resetZoom_rank">ズーム解除</button>
        </div>
      </div>

      <div class="mini" id="rankText" style="margin-bottom:6px;"></div>

      <div class="chartWrap"><canvas id="chRank"></canvas></div>

      <div class="bottomCtl">
        <div class="rangeOne" data-key="rank">
          <div class="rangeTrack"><div class="rangeFill" id="fill_rank"></div></div>
          <input id="rngA_rank" type="range" min="0" max="100" value="0" />
          <input id="rngB_rank" type="range" min="0" max="100" value="100" />
        </div>
        <div class="mini" id="label_rank"></div>
      </div>
    </div>
  </div>

  <!-- ===== Tab: logs ===== -->
  <div id="tab_logs" style="display:none;">
    <pre id="readLog"></pre>
    <pre id="drawLog"></pre>
  </div>

</div>

<script>
  // ===== Config =====
  const PROJECT_URL = "https://lfvxfvcijdtnpuhrlnqj.supabase.co";
  const PUBLISHABLE_KEY = "sb_publishable_3oNlDsSU06CHAJkhrJ9Tvg_4WmLAZ6o";
  const PAGE_SIZE = 1000;

  const DIFF_KEYS = ["lunatic","torment","insane","extreme","hardcore","veryhard","hard","normal"];
  const COLOR = {
    participants:"#111827",
    lunatic:"#c0392b", torment:"#e67e22", insane:"#f1c40f",
    extreme:"#27ae60", hardcore:"#16a085", veryhard:"#2980b9",
    hard:"#8e44ad", normal:"#95a5a6",
    lowSum:"#6b7280"
  };

  // ===== DOM =====
  const readLogEl = document.getElementById("readLog");
  const drawLogEl = document.getElementById("drawLog");
  const loadBtn = document.getElementById("loadBtn");
  const statusPill = document.getElementById("statusPill");
  const loadingMsg = document.getElementById("loadingMsg");
  const loadingTxt = document.getElementById("loadingText");
  const rowCountEl = document.getElementById("rowCount");
  const checkBox = document.getElementById("checkBox");

  const kpiTime = document.getElementById("kpiTime");
  const kpiP = document.getElementById("kpiP");
  const kpiHC = document.getElementById("kpiHC");
  const kpiEX = document.getElementById("kpiEX");

  const presetSelect = document.getElementById("presetSelect");
  const jumpLatestBtn = document.getElementById("jumpLatestBtn");
  const resetAllBtn = document.getElementById("resetAllBtn");

  const menuBtn = document.getElementById("menuBtn");
  const menu = document.getElementById("menu");
  const closeMenuBtn = document.getElementById("closeMenuBtn");

  const rankInput = document.getElementById("rankInput");
  const rankApplyBtn = document.getElementById("rankApplyBtn");
  const rankText = document.getElementById("rankText");

  const logRead = (s)=> readLogEl.textContent += s + "\n";
  const logDraw = (s)=> drawLogEl.textContent += s + "\n";

  function setStatus(text, kind="idle"){
    statusPill.textContent = text;
    statusPill.style.color = kind==="ok" ? "#16a34a" : kind==="warn" ? "#ea580c" : "#6b7280";
  }
  function setLoading(on, text="読み込み中…"){
    loadBtn.disabled = on;
    loadingMsg.classList.toggle("visible", on);
    loadingTxt.textContent = text;
    setStatus(on ? "読み込み中" : "待機", on ? "warn" : "idle");
  }

  // ===== Menu =====
  function closeMenu(){ menu.classList.remove("open"); }
  menuBtn.addEventListener("click", ()=> menu.classList.toggle("open"));
  closeMenuBtn.addEventListener("click", closeMenu);
  document.addEventListener("click", (e)=>{
    if(!menu.contains(e.target) && !menuBtn.contains(e.target)) closeMenu();
  });

  // ===== Tabs =====
  function showTab(name){
    document.getElementById("tab_numbers").style.display = (name==="numbers") ? "" : "none";
    document.getElementById("tab_share").style.display   = (name==="share") ? "" : "none";
    document.getElementById("tab_delta").style.display   = (name==="delta") ? "" : "none";
    document.getElementById("tab_rank").style.display    = (name==="rank") ? "" : "none";
    document.getElementById("tab_logs").style.display    = (name==="logs") ? "" : "none";
    document.querySelectorAll(".tabs .tab").forEach(t=>{
      t.classList.toggle("active", t.dataset.tab===name);
    });
  }
  document.querySelectorAll(".tabs .tab").forEach(t=>{
    t.addEventListener("click", ()=> showTab(t.dataset.tab));
  });

  // ===== Time format JST =====
  const jstFormatter = new Intl.DateTimeFormat("ja-JP", {
    timeZone:"Asia/Tokyo",
    year:"numeric", month:"2-digit", day:"2-digit",
    hour:"2-digit", minute:"2-digit", second:"2-digit",
    hour12:false
  });
  const fmtJST = (msOrIso)=>{
    const d = typeof msOrIso === "number" ? new Date(msOrIso) : new Date(msOrIso);
    return jstFormatter.format(d);
  };

  // ===== Fetch all =====
  function makeLoadUrl(eventId, offset=0){
    return `${PROJECT_URL}/rest/v1/snapshots_public` +
      `?select=captured_at,participants,lunatic,torment,insane,extreme,hardcore,veryhard,hard,normal` +
      `&event_id=eq.${encodeURIComponent(eventId)}` +
      `&order=captured_at.asc` +
      `&limit=${PAGE_SIZE}&offset=${offset}`;
  }
  async function fetchPage(url){
    const res = await fetch(url, {
      headers:{
        apikey: PUBLISHABLE_KEY,
        Authorization: `Bearer ${PUBLISHABLE_KEY}`,
        Accept:"application/json"
      }
    });
    const text = await res.text();
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${text}`);
    return text ? JSON.parse(text) : [];
  }
  async function fetchAll(eventId){
    readLogEl.textContent = "";
    drawLogEl.textContent = "";
    let all=[], offset=0, page=1;
    while(true){
      const url = makeLoadUrl(eventId, offset);
      logRead(`--- PAGE ${page} (offset=${offset}) ---`);
      logRead(url);
      setLoading(true, `読み込み中… (${page}ページ目)`);
      const rows = await fetchPage(url);
      logRead(`取得件数: ${rows.length}`);
      all = all.concat(rows);
      if(rows.length < PAGE_SIZE) break;
      offset += PAGE_SIZE;
      page++;
    }
    logRead(`合計取得件数: ${all.length}`);
    return all;
  }

  // ===== Normalize =====
  function toMsUTC(iso){
    const s = String(iso).trim();
    let dt = luxon.DateTime.fromISO(s, { zone:"utc" });
    if(!dt.isValid) dt = luxon.DateTime.fromISO(s + "Z");
    return dt.isValid ? dt.toMillis() : null;
  }
  const num0 = (v)=> Number.isFinite(Number(v)) ? Number(v) : 0;

  function normalize(rows){
    const out = rows.map(r=>{
      const t = toMsUTC(r.captured_at);
      if(t==null) return null;
      const o = { t, captured_at: r.captured_at };
      o.participants = num0(r.participants);
      for(const k of DIFF_KEYS) o[k] = num0(r[k]);
      return o;
    }).filter(Boolean).sort((a,b)=>a.t-b.t);

    for(let i=0;i<out.length;i++){
      const cur = out[i];
      const prev = out[i-1];
      const dtMs = i===0 ? 0 : (cur.t - prev.t);
      cur.dtHours = dtMs>0 ? dtMs/3600000 : 0;

      cur.d_participants = i===0 ? 0 : (cur.participants - prev.participants);
      cur.rate_participants = cur.dtHours>0 ? cur.d_participants/cur.dtHours : 0;

      for(const k of DIFF_KEYS){
        cur["d_"+k] = i===0 ? 0 : (cur[k]-prev[k]);
        cur["rate_"+k] = cur.dtHours>0 ? cur["d_"+k]/cur.dtHours : 0;
      }

      cur.sumDiff = DIFF_KEYS.reduce((s,k)=>s+cur[k],0);
      cur.gap = cur.sumDiff - cur.participants;

      cur.share = {};
      for(const k of DIFF_KEYS){
        cur.share[k] = cur.participants>0 ? cur[k]/cur.participants : 0;
      }
    }
    return out;
  }

  // ===== Touch pinch: prevent page zoom on iOS =====
  function preventPagePinchZoomOn(el){
    ["gesturestart","gesturechange","gestureend"].forEach(type=>{
      el.addEventListener(type, (e)=> e.preventDefault(), { passive:false });
    });
    el.addEventListener("touchstart", (e)=>{
      if (e.touches && e.touches.length >= 2) e.preventDefault();
    }, { passive:false });
    el.addEventListener("touchmove", (e)=>{
      if (e.touches && e.touches.length >= 2) e.preventDefault();
    }, { passive:false });
  }

  // ===== Zoom behavior =====
  const isCoarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;

  // ===== Chart common =====
  function baseOptions(){
    return {
      responsive:true,
      maintainAspectRatio:false,
      parsing:false,
      normalized:true,
      animation:false,
      spanGaps:true,
      interaction:{ mode:"index", intersect:false },
      adapters:{ date:{ zone:"Asia/Tokyo" } },
      plugins:{
        legend:{ position:"top" },
        tooltip:{ mode:"index", intersect:false },
        decimation:{ enabled:true, algorithm:"lttb" },
        filler:{ propagate:false },
        zoom:{
          pan:{ enabled:true, mode:"x" },
          zoom:{
            wheel:{ enabled: !isCoarse },
            pinch:{ enabled: true },
            drag:{ enabled: !isCoarse },
            mode:"x"
          },
          limits:{}
        }
      },
      scales:{
        x:{
          type:"time",
          time:{
            tooltipFormat:"yyyy-LL-dd HH:mm:ss",
            displayFormats:{ minute:"LL-dd HH:mm", hour:"LL-dd HH:mm", day:"LL-dd" }
          },
          ticks:{ maxTicksLimit: 8 }
        }
      }
    };
  }
  function lineDS(label, data, color, {fill=false, points=true, stack=undefined, dash=null, width=2}={}){
    const ds = {
      label, data,
      borderColor: color,
      backgroundColor: color,
      borderWidth: width,
      tension: 0.15,
      fill,
      pointRadius: points ? 2 : 0,
      pointHoverRadius: points ? 5 : 0,
      pointHitRadius: 10
    };
    if(stack !== undefined) ds.stack = stack;
    if(Array.isArray(dash)) ds.borderDash = dash;
    return ds;
  }

  const clamp = (v,a,b)=> Math.max(a, Math.min(b, v));

  function lockZoomToData(chart, dataMin, dataMax){
    const z = chart?.options?.plugins?.zoom;
    if(!z) return;
    z.limits = { x:{ min:dataMin, max:dataMax, minRange: 60*1000 } };
    const sx = chart.options.scales?.x;
    if(sx){
      if(sx.min!=null) sx.min = clamp(sx.min, dataMin, dataMax);
      if(sx.max!=null) sx.max = clamp(sx.max, dataMin, dataMax);
    }
  }

  // ===== One range control (two thumbs) =====
  function attachOneRange({ key, chart, rowsN, onAfterRangeChange }){
    const a = document.getElementById(`rngA_${key}`);
    const b = document.getElementById(`rngB_${key}`);
    const fill = document.getElementById(`fill_${key}`);
    const label = document.getElementById(`label_${key}`);
    if(!a || !b || !fill || !label) return;

    const times = rowsN.map(r=>r.t);
    const dataMin = times[0], dataMax = times[times.length-1];

    const pctToMs = (pct)=>{
      const idx = Math.round((pct/100)*(times.length-1));
      return times[clamp(idx,0,times.length-1)];
    };

    function setFill(p1, p2){
      const left = Math.min(p1,p2);
      const right = Math.max(p1,p2);
      fill.style.left = `${left}%`;
      fill.style.width = `${right-left}%`;
    }

    function apply(){
      let p1 = Number(a.value), p2 = Number(b.value);
      if(p1>p2) [p1,p2] = [p2,p1];

      const xmin = pctToMs(p1);
      const xmax = pctToMs(p2);

      chart.options.scales.x.min = xmin;
      chart.options.scales.x.max = xmax;
      lockZoomToData(chart, dataMin, dataMax);
      chart.update("none");

      setFill(p1,p2);
      label.textContent = `${fmtJST(xmin)} ～ ${fmtJST(xmax)}  (${p1}%–${p2}%)`;

      if(typeof onAfterRangeChange==="function") onAfterRangeChange();
    }

    a.addEventListener("input", apply);
    b.addEventListener("input", apply);

    setFill(Number(a.value), Number(b.value));
    label.textContent = `${fmtJST(dataMin)} ～ ${fmtJST(dataMax)}  (0%–100%)`;
  }

  // ===== share Y auto-fit =====
  function autoFitYToVisible(chart, paddingRatio=0.08){
    const sx = chart.scales?.x;
    if(!sx) return;
    const xmin = sx.min, xmax = sx.max;
    let ymin = Infinity, ymax = -Infinity;

    for(const ds of chart.data.datasets){
      for(const p of (ds.data||[])){
        const x=p.x, y=p.y;
        if(x==null || y==null) continue;
        if(x < xmin || x > xmax) continue;
        if(!Number.isFinite(y)) continue;
        ymin = Math.min(ymin, y);
        ymax = Math.max(ymax, y);
      }
    }
    if(!Number.isFinite(ymin) || !Number.isFinite(ymax)) return;
    if(ymin===ymax){ ymin -= 0.5; ymax += 0.5; }
    const pad=(ymax-ymin)*paddingRatio;
    chart.options.scales.y.min = ymin - pad;
    chart.options.scales.y.max = ymax + pad;
  }
  function hookShareAutoFit(chart){
    const z = chart?.options?.plugins?.zoom;
    if(!z) return;
    const prevZoom = z.zoom.onZoomComplete;
    const prevPan  = z.pan.onPanComplete;

    z.zoom.onZoomComplete = ({chart})=>{
      autoFitYToVisible(chart);
      chart.update("none");
      if(typeof prevZoom==="function") prevZoom({chart});
    };
    z.pan.onPanComplete = ({chart})=>{
      autoFitYToVisible(chart);
      chart.update("none");
      if(typeof prevPan==="function") prevPan({chart});
    };
  }

  // ===== Instances =====
  let rowsN = [];
  let currentRank = null;

  let chParticipants=null, chMain=null, chTop=null, chLow=null, chShare=null, chRate=null, chRank=null;

  function destroyAll(){
    for(const ch of [chParticipants,chMain,chTop,chLow,chShare,chRate,chRank]) if(ch) ch.destroy();
    chParticipants=chMain=chTop=chLow=chShare=chRate=chRank=null;
  }

  // ===== Helpers =====
  const xy = (key)=> rowsN.map(r=>({x:r.t, y:r[key]}));
  const shareSeries = (key)=> rowsN.map(r=>({x:r.t, y:r.share[key]*100}));
  const rateP = ()=> rowsN.map(r=>({x:r.t, y:r.rate_participants}));
  const rate = (key)=> rowsN.map(r=>({x:r.t, y:r["rate_"+key]}));
  const fmt = (n)=> Number(n||0).toLocaleString("ja-JP");

  function renderKPIs(){
    if(!rowsN.length){
      kpiTime.textContent = "-";
      kpiP.textContent = "-";
      kpiHC.textContent = "-";
      kpiEX.textContent = "-";
      return;
    }
    const last = rowsN[rowsN.length-1];
    kpiTime.textContent = fmtJST(last.captured_at);
    kpiP.textContent = fmt(last.participants);
    kpiHC.textContent = `${fmt(last.hardcore)} (${(last.share.hardcore*100).toFixed(2)}%)`;
    kpiEX.textContent = `${fmt(last.extreme)} (${(last.share.extreme*100).toFixed(2)}%)`;
  }

  function renderChecks(){
    if(!rowsN.length){ checkBox.textContent = "未読み込み"; return; }
    const last = rowsN[rowsN.length-1];
    const lines = [];

    const gapAbs = Math.abs(last.gap);
    if(gapAbs===0) lines.push(`sum=participants OK`);
    else if(gapAbs<=50) lines.push(`sumズレ 注意: ${fmt(last.gap)}（<=50）`);
    else lines.push(`sumズレ NG: ${fmt(last.gap)}`);

    if(rowsN.length>=2){
      const prev = rowsN[rowsN.length-2];
      const dP = last.participants - prev.participants;
      lines.push(`Δparticipants: ${fmt(dP)} / Δt=${last.dtHours.toFixed(3)}h / rate=${last.rate_participants.toFixed(2)}/h`);
      if(dP<0) lines.push(`⚠ participantsが減少（観測揺れ or 入力ミス疑い）`);
    }
    checkBox.textContent = lines.join("\n");
  }

  // ===== Rank (cutoffs + classification) =====
  function classifyRankAtRow(row, rank){
    const L = row.lunatic;
    const LT = L + row.torment;
    const LTI = LT + row.insane;
    const LTIE = LTI + row.extreme;
    const LTIEHc = LTIE + row.hardcore;
    const LTIEHcVh = LTIEHc + row.veryhard;
    const LTIEHcVhH = LTIEHcVh + row.hard;
    const ALL = row.participants;

    if (rank <= 0) return { tier:"-", note:"順位が不正" };
    if (rank > ALL) return { tier:"圏外", note:`participants(${fmt(ALL)})より大きい` };

    if (rank <= L) return { tier:"Lunatic", note:`Lunatic内 ${fmt(rank)}位` };
    if (rank <= LT) return { tier:"Torment", note:`Torment内 ${fmt(rank-L)}位` };
    if (rank <= LTI) return { tier:"Insane", note:`Insane内 ${fmt(rank-LT)}位` };
    if (rank <= LTIE) return { tier:"Extreme", note:`Extreme内 ${fmt(rank-LTI)}位` };
    if (rank <= LTIEHc) return { tier:"Hardcore", note:`Hardcore内 ${fmt(rank-LTIE)}位` };
    if (rank <= LTIEHcVh) return { tier:"VeryHard", note:`VeryHard内 ${fmt(rank-LTIEHc)}位` };
    if (rank <= LTIEHcVhH) return { tier:"Hard", note:`Hard内 ${fmt(rank-LTIEHcVh)}位` };
    return { tier:"Normal", note:`Normal内 ${fmt(rank-LTIEHcVhH)}位` };
  }

  function buildCutoffs(rowsN){
    return rowsN.map(r=>{
      const L  = r.lunatic;
      const LT = L + r.torment;
      const LTI = LT + r.insane;
      const LTIE = LTI + r.extreme;
      const LTIEHc = LTIE + r.hardcore;
      const LTIEHcVh = LTIEHc + r.veryhard;
      const LTIEHcVhH = LTIEHcVh + r.hard;
      const ALL = r.participants;
      return { x:r.t, L, LT, LTI, LTIE, LTIEHc, LTIEHcVh, LTIEHcVhH, ALL };
    });
  }

  function renderRankChart(){
    if(!rowsN.length) return;

    const cut = buildCutoffs(rowsN);
    const opt = baseOptions();
    opt.scales.y = { beginAtZero:false, reverse:true }; // 順位は小さいほど上

    const dsBoundary = (label, key, color) =>
      lineDS(label, cut.map(p=>({x:p.x, y:p[key]})), color, { fill:false, points:false, width:2 });

    const datasets = [
      dsBoundary("Lunatic境界", "L", COLOR.lunatic),
      dsBoundary("Torment境界", "LT", COLOR.torment),
      dsBoundary("Insane境界", "LTI", COLOR.insane),
      dsBoundary("Extreme境界", "LTIE", COLOR.extreme),
      dsBoundary("Hardcore境界", "LTIEHc", COLOR.hardcore),
      dsBoundary("VeryHard境界", "LTIEHcVh", COLOR.veryhard),
      dsBoundary("Hard境界", "LTIEHcVhH", COLOR.hard),
      dsBoundary("Participants", "ALL", COLOR.participants),
    ];

    if(Number.isFinite(currentRank) && currentRank > 0){
      const meLine = rowsN.map(r=>({x:r.t, y: currentRank}));
      const me = lineDS("入力順位", meLine, "#111827", { fill:false, points:false, dash:[6,4], width:3 });
      datasets.unshift(me);
    }

    if(chRank) chRank.destroy();
    chRank = new Chart(document.getElementById("chRank"), {
      type:"line",
      data:{ datasets },
      options: opt
    });

    const dataMin = rowsN[0].t, dataMax = rowsN[rowsN.length-1].t;
    lockZoomToData(chRank, dataMin, dataMax);
    attachOneRange({ key:"rank", chart: chRank, rowsN });

    document.getElementById("resetZoom_rank").onclick = ()=>{
      const a=document.getElementById("rngA_rank");
      const b=document.getElementById("rngB_rank");
      a.value=0; b.value=100; a.dispatchEvent(new Event("input"));
      if(chRank.resetZoom) chRank.resetZoom();
    };
  }

      attachOneRange({ key:"low", chart: chLow, rowsN });
      document.getElementById("resetZoom_low").onclick = ()=>{
        const a=document.getElementById("rngA_low");
        const b=document.getElementById("rngB_low");
        a.value=0; b.value=100; a.dispatchEvent(new Event("input"));
        if(chLow.resetZoom) chLow.resetZoom();
      };
    }

    // ⑤ share
    {
      const opt = baseOptions();
      opt.scales.y = { beginAtZero:true, ticks:{ callback:(v)=> `${v}%` } };

      const lowShare = rowsN.map(r=>({ x:r.t, y: r.participants>0 ? ((r.veryhard+r.hard+r.normal)/r.participants)*100 : 0 }));

      chShare = new Chart(document.getElementById("chShare"),{

      lockZoomToData(chShare, dataMin, dataMax);

      attachOneRange({

  // ===== Preset apply (global) =====
  function applyPreset(rangeKey){
    if(!rowsN.length) return;
    const dataMin = rowsN[0].t;
    const dataMax = rowsN[rowsN.length-1].t;
    const H = 3600000;

    let xmin = dataMin, xmax = dataMax;
    if(rangeKey==="24h") xmin = Math.max(dataMin, dataMax - 24*H);
    if(rangeKey==="12h") xmin = Math.max(dataMin, dataMax - 12*H);
    if(rangeKey==="6h")  xmin = Math.max(dataMin, dataMax -  6*H);
    if(rangeKey==="1h")  xmin = Math.max(dataMin, dataMax -  1*H);

    const charts = [chParticipants,chMain,chTop,chLow,chShare,chRate,chRank].filter(Boolean);
    for(const ch of charts){
      ch.options.scales.x.min = xmin;
      ch.options.scales.x.max = xmax;
      lockZoomToData(ch, dataMin, dataMax);
      if(ch.resetZoom) ch.resetZoom();
      ch.update("none");
    }
    if(chShare){ autoFitYToVisible(chShare); chShare.update("none"); }

    // slider positions (approx)
    const idxOf = (ms)=>{
      let lo=0, hi=rowsN.length-1;
      while(lo<hi){
        const mid=(lo+hi)>>1;
        if(rowsN[mid].t < ms) lo=mid+1; else hi=mid;
      }
      return lo;
    };
    const toPct = (ms)=>{
      const idx = idxOf(ms);
      return Math.round((idx/(rowsN.length-1))*100);
    };
    const p1 = toPct(xmin), p2 = toPct(xmax);

    const setPair = (k)=>{
      const a=document.getElementById(`rngA_${k}`);
      const b=document.getElementById(`rngB_${k}`);
      if(!a||!b) return;
      a.value=p1; b.value=p2;
      a.dispatchEvent(new Event("input"));
    };
    setPair("participants"); setPair("main"); setPair("top"); setPair("low"); setPair("share"); setPair("rate"); setPair("rank");
  }

  presetSelect.addEventListener("change", ()=>{
    applyPreset(presetSelect.value);
  });
  jumpLatestBtn.addEventListener("click", ()=>{
    presetSelect.value = "1h";
    applyPreset("1h");
    closeMenu();
  });
  resetAllBtn.addEventListener("click", ()=>{
    presetSelect.value = "all";
    applyPreset("all");
    closeMenu();
  });

  // ===== Rank apply =====
  rankApplyBtn.addEventListener("click", ()=>{
    const v = Number(rankInput.value);
    currentRank = (Number.isFinite(v) && v > 0) ? Math.floor(v) : null;

    if(!rowsN.length){
      rankText.textContent = "";
      return;
    }
    if(currentRank){
      const last = rowsN[rowsN.length-1];
      const r = classifyRankAtRow(last, currentRank);
      rankText.textContent = `最新: ${r.tier}（${r.note}）`;
    }else{
      rankText.textContent = "";
    }
    renderRankChart();
    if(isCoarse){
      document.querySelectorAll("canvas").forEach(preventPagePinchZoomOn);
    }
  });

  // ===== Main load =====
  async function load(){
    const eventId = document.getElementById("eventId").value.trim();
    if(!eventId) return alert("event_id が空");
    setLoading(true);
    try{
      const rows = await fetchAll(eventId);
      rowsN = normalize(rows);
      rowCountEl.textContent = String(rowsN.length);
      renderCharts();
      presetSelect.value = "all";
      applyPreset("all");
    }catch(e){
      setStatus("エラー","warn");
      logDraw("ERROR: " + e.message);
    }finally{
      setLoading(false);
    }
  }
  loadBtn.addEventListener("click", load);
  load();
</script>

</body>
</html>

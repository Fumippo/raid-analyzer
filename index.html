<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>イベント分析（グラフ強制表示版 / FIX）</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- Luxon + adapter -->
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.5.0/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; max-width: 1100px; margin: 0 auto; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin: 8px 0; }
    input, textarea { padding: 8px; }
    input { min-width: 260px; }
    textarea { width: 100%; min-height: 220px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    button { padding: 8px 12px; cursor: pointer; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin: 12px 0; }
    pre { background:#f6f6f6; padding:12px; overflow:auto; border-radius: 10px; }
    .small { color:#666; font-size: 13px; margin: 6px 0; }
    .ok { color: #0a7; font-weight: 700; }
    .ng { color: #c00; font-weight: 700; }

    /* ★ここが本命：チャート領域の高さを固定して潰れを防ぐ */
    .chartWrap {
      height: 360px;
      border: 1px solid #eee;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      margin: 10px 0;
    }
    .chartWrap canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>

<body>
  <h1>イベント分析（グラフ強制表示版 / FIX）</h1>
  <p class="small">
    「軸や枠は出るのに線が出ない」＝ほぼ確で <b>x/y が無効（Invalid / NaN）</b>。<br>
    この版は <b>型を強制</b>して絶対に線を出す（そしてログで原因も出す）。
  </p>

  <div class="card">
    <h2>① 公開データ読み込み</h2>
    <div class="row">
      <label>event_id：</label>
      <input id="eventId" value="BA-2026-02" />
      <button id="loadBtn">読み込む</button>
    </div>

    <div class="small">
      Chart.js: <span id="chartVer"></span> / Luxon: <span id="luxonVer"></span> / Adapter: <span id="adapterOk"></span>
    </div>

    <div class="chartWrap">
      <canvas id="participantsChart"></canvas>
    </div>

    <div class="chartWrap">
      <canvas id="difficultyChart"></canvas>
    </div>

    <h3>取得ログ</h3>
    <pre id="readLog"></pre>

    <h3>描画ログ</h3>
    <pre id="drawLog"></pre>
  </div>

  <div class="card">
    <h2>② ログイン（自分だけ投稿）</h2>
    <div class="row">
      <input id="email" placeholder="自分のメールアドレス" />
      <button id="loginBtn">ログインリンク送信</button>
      <button id="sessionBtn">セッション確認</button>
      <button id="logoutBtn">ログアウト</button>
    </div>
    <pre id="authLog"></pre>
  </div>

  <div class="card">
    <h2>③ 入力（コピペ→プレビュー→保存）</h2>
    <textarea id="paste" placeholder="ログをコピペ（タブ区切り推奨）"></textarea>
    <div class="row">
      <button id="previewBtn">プレビュー</button>
      <button id="saveBtn">保存（DBへ）</button>
      <span id="previewStatus"></span>
    </div>
    <pre id="previewOut"></pre>
    <pre id="writeLog"></pre>
  </div>

  <script>
    /**********************************************************************
     * 設定
     **********************************************************************/
    const PROJECT_URL = "https://lfvxfvcijdtnpuhrlnqj.supabase.co";
    const PUBLISHABLE_KEY = "sb_publishable_3oNlDsSU06CHAJkhrJ9Tvg_4WmLAZ6o";
    const SITE_URL = "https://fumippo.github.io/raid-analyzer/";

    const supabaseClient = supabase.createClient(PROJECT_URL, PUBLISHABLE_KEY);

    const readLogEl = document.getElementById("readLog");
    const drawLogEl = document.getElementById("drawLog");

    const logRead = (s) => readLogEl.textContent += s + "\n";
    const logDraw = (s) => drawLogEl.textContent += s + "\n";

    document.getElementById("chartVer").textContent = (window.Chart && Chart.version) ? Chart.version : "NOT LOADED";
    document.getElementById("luxonVer").textContent = (window.luxon && luxon.VERSION) ? luxon.VERSION : "NOT LOADED";
    document.getElementById("adapterOk").textContent = "OK（time軸使用）";

    /**********************************************************************
     * Auth callback
     **********************************************************************/
    async function initAuthCallback() {
      const url = new URL(window.location.href);
      const code = url.searchParams.get("code");
      if (!code) return;

      const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
      if (error) {
        document.getElementById("authLog").textContent = "AuthCallback ERROR: " + error.message;
        return;
      }
      url.searchParams.delete("code");
      window.history.replaceState({}, document.title, url.toString());
    }

    async function showSession() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) {
        document.getElementById("authLog").textContent = "getSession ERROR: " + error.message;
        return;
      }
      const session = data.session;
      document.getElementById("authLog").textContent = session?.user
        ? `ログイン中\nemail: ${session.user.email}\nuid: ${session.user.id}`
        : "未ログイン";
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      if (!email) return alert("メールアドレスを入れて");

      const { error } = await supabaseClient.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: SITE_URL }
      });

      document.getElementById("authLog").textContent = error
        ? "OTP送信ERROR: " + error.message
        : "送信OK。メールのリンクを踏め。";
    });

    document.getElementById("sessionBtn").addEventListener("click", showSession);
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      await showSession();
    });

    supabaseClient.auth.onAuthStateChange(() => showSession());

    /**********************************************************************
     * REST読み取り
     **********************************************************************/
    function makeLoadUrl(eventId) {
      return `${PROJECT_URL}/rest/v1/snapshots_public` +
        `?select=captured_at,participants,lunatic,torment,insane,extreme,hardcore,veryhard,hard,normal` +
        `&event_id=eq.${encodeURIComponent(eventId)}` +
        `&order=captured_at.asc`;
    }

    async function fetchJson(url) {
      readLogEl.textContent = "";
      logRead("REQUEST:");
      logRead(url);

      const res = await fetch(url, {
        headers: {
          apikey: PUBLISHABLE_KEY,
          Authorization: `Bearer ${PUBLISHABLE_KEY}`,
          Accept: "application/json"
        }
      });

      const text = await res.text();
      logRead("");
      logRead(`STATUS: ${res.status}`);
      logRead("");
      logRead("RESPONSE (first 800 chars):");
      logRead(text.slice(0, 800));

      if (!res.ok) throw new Error(`HTTP ${res.status}: ${text}`);
      return text ? JSON.parse(text) : [];
    }

    /**********************************************************************
     * グラフ描画（FIX：型を強制して線が出ない問題を潰す）
     **********************************************************************/
    let chart1 = null, chart2 = null;

    function toMs(x) {
      // captured_at が ISO文字列でも Dateでも吸えるようにする
      const d = (x instanceof Date) ? x : new Date(String(x));
      const t = d.getTime();
      return Number.isFinite(t) ? t : null;
    }

    function toNum(y) {
      const n = Number(y);
      return Number.isFinite(n) ? n : null;
    }

    function renderCharts(rows) {
      drawLogEl.textContent = "";
      logDraw(`rows: ${rows.length}`);

      if (!Array.isArray(rows) || rows.length === 0) {
        logDraw("データ0件。event_idが違うか、公開テーブルに行が無い。");
        return;
      }

      // ソート
      rows = [...rows].sort((a, b) => new Date(a.captured_at) - new Date(b.captured_at));

      // 先頭行と型をログに出す（原因特定用）
      try {
        logDraw("firstRow:");
        logDraw(JSON.stringify(rows[0], null, 2));
        const typeProbe = rows.slice(0, 3).map(r => ({
          captured_at: r.captured_at,
          participants: r.participants,
          participants_type: typeof r.participants
        }));
        logDraw("typeProbe:");
        logDraw(JSON.stringify(typeProbe, null, 2));
      } catch (e) {
        logDraw("logProbe ERROR: " + e.message);
      }

      // ★ここが重要：x=ms数値 / y=数値 に強制
      const seriesXY = (key) => {
        const pts = rows.map(r => ({ x: toMs(r.captured_at), y: toNum(r[key]) }))
                        .filter(p => p.x !== null && p.y !== null);
        logDraw(`series "${key}" validPoints: ${pts.length} / ${rows.length}`);
        if (pts.length > 0) {
          logDraw(`series "${key}" head: ` + JSON.stringify(pts.slice(0, 2)));
        }
        return pts;
      };

      const commonOptions = {
        responsive: true,
        maintainAspectRatio: false, // ★wrapの高さに追従
        // ★parsing:false は外す（文字列/型ブレで死ぬ原因になりがち）
        // parsing: false,
        normalized: true,
        scales: {
          x: {
            type: "time",
            time: {
              tooltipFormat: "yyyy-LL-dd HH:mm:ss",
              displayFormats: { minute:"LL-dd HH:mm", hour:"LL-dd HH:mm", day:"LL-dd" }
            }
          }
        },
        plugins: {
          legend: { display: true }
        }
      };

      // 参加人数
      const ctx1 = document.getElementById("participantsChart");
      if (chart1) chart1.destroy();
      chart1 = new Chart(ctx1, {
        type: "line",
        data: {
          datasets: [{
            label: "参加人数",
            data: seriesXY("participants"),
            pointRadius: 2,   // ★1点しかなくても見える
            pointHitRadius: 8,
            spanGaps: true
          }]
        },
        options: commonOptions
      });
      logDraw("participantsChart: OK");

      // 難易度別
      const ctx2 = document.getElementById("difficultyChart");
      if (chart2) chart2.destroy();
      chart2 = new Chart(ctx2, {
        type: "line",
        data: {
          datasets: [
            { label: "Lunatic",  data: seriesXY("lunatic"),  pointRadius: 0, spanGaps: true },
            { label: "Torment",  data: seriesXY("torment"),  pointRadius: 0, spanGaps: true },
            { label: "Insane",   data: seriesXY("insane"),   pointRadius: 0, spanGaps: true },
            { label: "Extreme",  data: seriesXY("extreme"),  pointRadius: 0, spanGaps: true },
            { label: "Hardcore", data: seriesXY("hardcore"), pointRadius: 0, spanGaps: true },
            { label: "Veryhard", data: seriesXY("veryhard"), pointRadius: 0, spanGaps: true },
            { label: "Hard",     data: seriesXY("hard"),     pointRadius: 0, spanGaps: true },
            { label: "Normal",   data: seriesXY("normal"),   pointRadius: 0, spanGaps: true }
          ]
        },
        options: commonOptions
      });
      logDraw("difficultyChart: OK");

      // “本当に描画されてる”証拠（canvasの中身が取れるか）
      try {
        const sig1 = ctx1.toDataURL().slice(0, 50);
        const sig2 = ctx2.toDataURL().slice(0, 50);
        logDraw("canvasSig participants: " + sig1);
        logDraw("canvasSig difficulty  : " + sig2);
      } catch (e) {
        logDraw("canvasSig ERROR: " + e.message);
      }
    }

    async function loadPublic() {
      const eventId = document.getElementById("eventId").value.trim();
      if (!eventId) return alert("event_id が空");

      try {
        const rows = await fetchJson(makeLoadUrl(eventId));
        renderCharts(rows);
      } catch (e) {
        logDraw("loadPublic ERROR: " + e.message);
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadPublic);

    /**********************************************************************
     * パース＋保存
     **********************************************************************/
    function splitLine(line) {
      if (line.includes("\t")) return line.split("\t");
      return line.trim().split(/\s+/);
    }

    function parsePasted(text) {
      const lines = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      if (lines.length === 0) return [];

      const isHeader = (s) => s.includes("自分の順位") || s.includes("参加人数");
      let startIdx = isHeader(lines[0]) ? 1 : 0;

      const out = [];
      for (let i = startIdx; i < lines.length; i++) {
        const cols = splitLine(lines[i]);
        if (cols.length < 11) continue;

        const looksDate = /^\d{4}\/\d{1,2}\/\d{1,2}$/.test(cols[0]) || /^\d{4}-\d{1,2}-\d{1,2}$/.test(cols[0]);
        const looksTime = /^\d{1,2}:\d{2}:\d{2}$/.test(cols[1] ?? "");
        let dtStr, offset = 0;
        if (looksDate && looksTime) { dtStr = `${cols[0]} ${cols[1]}`; offset = 1; }
        else { dtStr = cols[0]; offset = 0; }

        const captured = new Date(dtStr.replace(/\//g, "-"));
        if (Number.isNaN(captured.getTime())) continue;

        const my_rank = Number(cols[1+offset]);
        const lunatic = Number(cols[2+offset]);
        const torment = Number(cols[3+offset]);
        const insane  = Number(cols[4+offset]);
        const extreme = Number(cols[5+offset]);
        const hardcore= Number(cols[6+offset]);
        const veryhard= Number(cols[7+offset]);
        const hard    = Number(cols[8+offset]);
        const normal  = Number(cols[9+offset]);
        const participants = Number(cols[10+offset]);

        if (![my_rank,lunatic,torment,insane,extreme,hardcore,veryhard,hard,normal,participants].every(n => Number.isFinite(n))) continue;

        out.push({
          captured_at: captured.toISOString(),
          my_rank, lunatic, torment, insane, extreme, hardcore, veryhard, hard, normal, participants
        });
      }
      return out;
    }

    function showPreview(parsed) {
      document.getElementById("previewOut").textContent = JSON.stringify(parsed.slice(0,3), null, 2);
      const s = document.getElementById("previewStatus");
      s.textContent = `読み取り ${parsed.length} 行`;
      s.className = parsed.length ? "ok" : "ng";
    }

    document.getElementById("previewBtn").addEventListener("click", () => {
      showPreview(parsePasted(document.getElementById("paste").value));
    });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const eventId = document.getElementById("eventId").value.trim();
      if (!eventId) return alert("event_id が空");

      const { data } = await supabaseClient.auth.getSession();
      const user = data.session?.user;
      if (!user) return document.getElementById("writeLog").textContent = "未ログイン。まずログインして。";

      const parsed = parsePasted(document.getElementById("paste").value);
      showPreview(parsed);
      if (parsed.length === 0) return document.getElementById("writeLog").textContent = "取り込める行が0。";

      const publicRows = parsed.map(r => ({
        event_id: eventId,
        captured_at: r.captured_at,
        participants: r.participants,
        lunatic: r.lunatic,
        torment: r.torment,
        insane: r.insane,
        extreme: r.extreme,
        hardcore: r.hardcore,
        veryhard: r.veryhard,
        hard: r.hard,
        normal: r.normal,
        owner: user.id
      }));

      const privateRows = parsed.map(r => ({
        event_id: eventId,
        captured_at: r.captured_at,
        my_rank: r.my_rank,
        owner: user.id
      }));

      document.getElementById("writeLog").textContent = "保存中…";

      const ins1 = await supabaseClient.from("snapshots_public").insert(publicRows);
      if (ins1.error) return document.getElementById("writeLog").textContent = "public保存失敗: " + ins1.error.message;

      const ins2 = await supabaseClient.from("snapshots_private").insert(privateRows);
      if (ins2.error) return document.getElementById("writeLog").textContent = "private保存失敗: " + ins2.error.message;

      document.getElementById("writeLog").textContent = `保存完了：${parsed.length}行`;
      await loadPublic();
    });

    /**********************************************************************
     * 起動
     **********************************************************************/
    (async () => {
      await initAuthCallback();
      await showSession();
      await loadPublic();
    })();
  </script>
</body>
</html>
